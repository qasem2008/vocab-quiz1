.badge-en{background:#dcfce7;color:#166534;}

.q-sub{font-size:14px;color:#888;margin-bottom:1.2rem;}

.opt.correct{background:#dcfce7;border-color:#16a34a;color:#14532d;}
.opt.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d;}
.opt:disabled{cursor:default;}
.opt.ar-opt{direction:rtl;}
.opt.en-opt{font-style:italic;}
.feedback{margin-top:1rem;padding:10px 14px;border-radius:10px;font-size:14px;display:none;direction:rtl;}
.feedback.correct{background:#dcfce7;color:#14532d;display:block;}
.feedback.wrong{background:#fee2e2;color:#7f1d1d;display:block;}
.next-btn{width:100%;margin-top:1rem;padding:13px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:none;font-family:inherit;}

let pool=[],idx=0,score=0,wrong=0,answered=false,currentUnit='all',currentMode='ar',currentDir='ar';
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getPool(u){return u==='all'?[...allWords]:allWords.filter(w=>w.u===u);}
function selectUnit(u,el){currentUnit=u;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');restart();}
function selectMode(m,el){currentMode=m;document.querySelectorAll('.mode-btn').forEach(t=>t.classList.remove('active'));el.classList.add('active');restart();}
function getQuestionDir(){if(currentMode==='ar')return'ar';if(currentMode==='en')return'en';return Math.random()<0.5?'ar':'en';}
function restart(){pool=shuffle(getPool(currentUnit));idx=0;score=0;wrong=0;answered=false;document.getElementById('result').style.display='none';document.getElementById('qcard').style.display='block';updateStats();showQ();}
function updateStats(){document.getElementById('s-score').textContent=score;document.getElementById('s-wrong').textContent=wrong;document.getElementById('s-remain').textContent=pool.length-idx;const pct=pool.length>0?Math.round((idx/pool.length)*100):0;document.getElementById('prog').style.width=pct+'%';}
function showQ(){
  if(idx>=pool.length){showResult();return;}
  const w=pool[idx];currentDir=getQuestionDir();
  document.getElementById('qcount').textContent='السؤال '+(idx+1)+' من '+pool.length;
  const badge=document.getElementById('qbadge'),main=document.getElementById('qmain'),sub=document.getElementById('qsub'),optsEl=document.getElementById('opts');
  if(currentDir==='ar'){
    badge.textContent='🇸🇦 اختر الترجمة الإنجليزية';badge.className='q-mode-badge badge-ar';
    main.textContent=w.ar;main.style.direction='rtl';sub.textContent='What is the English word for this?';
    const opts=shuffle([w,...shuffle(allWords.filter(x=>x.en!==w.en)).slice(0,3)]);
    optsEl.innerHTML='';
    opts.forEach(o=>{const b=document.createElement('button');b.className='opt en-opt';b.textContent=o.en;b.onclick=()=>answer(b,o.en,w.en,w.en);optsEl.appendChild(b);});
  }else{
    badge.textContent='🇬🇧 اختر الترجمة العربية';badge.className='q-mode-badge badge-en';
    main.textContent=w.en;main.style.direction='ltr';sub.textContent='ما معنى هذه الكلمة بالعربية؟';
    const opts=shuffle([w,...shuffle(allWords.filter(x=>x.ar!==w.ar)).slice(0,3)]);
    optsEl.innerHTML='';
    opts.forEach(o=>{const b=document.createElement('button');b.className='opt ar-opt';b.textContent=o.ar;b.onclick=()=>answer(b,o.ar,w.ar,w.ar);optsEl.appendChild(b);});
  }
  document.getElementById('feedback').className='feedback';document.getElementById('feedback').textContent='';document.getElementById('nextbtn').style.display='none';answered=false;
}
function answer(btn,chosen,correct,correctVal){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===correctVal)b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(chosen===correct){score++;btn.classList.add('correct');fb.textContent='✅ ممتاز! الإجابة صحيحة';fb.className='feedback correct';}
  else{wrong++;btn.classList.add('wrong');fb.textContent='❌ الإجابة الصحيحة: '+correctVal;fb.className='feedback wrong';}
  idx++;updateStats();document.getElementById('nextbtn').style.display='block';
}
function nextQ(){showQ();}
function showResult(){
  document.getElementById('qcard').style.display='none';
  const r=document.getElementById('result');r.style.display='block';
  const pct=Math.round((score/pool.length)*100);
  document.getElementById('res-score').textContent=pct+'%';
  let msg='';
  if(pct>=90)msg='🏆 ممتاز! أداء رائع';
  else if(pct>=70)msg='👍 جيد جداً! استمر في المراجعة';
  else if(pct>=50)msg='📖 جيد، لكن تحتاج مزيداً من المراجعة';
  else msg='💪 راجع المفردات مجدداً وحاول مرة أخرى';
  document.getElementById('res-msg').textContent=msg+' — الصحيح: '+score+' من '+pool.length;
}
restart();
